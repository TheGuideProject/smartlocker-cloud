<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartLocker Cloud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #090c14;
            --bg-card: #151c2c;
            --bg-input: #0d1219;
            --border: #1e293b;
            --ppg-teal: #00d4aa;
            --ppg-teal-dim: #00a888;
            --text: #f1f5f9;
            --text-sec: #94a3b8;
            --text-muted: #475569;
            --text-inverse: #0f172a;
            --danger: #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-base);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0, 212, 170, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(96, 165, 250, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-brand-name {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .login-brand h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .login-brand .badge {
            background: linear-gradient(135deg, var(--ppg-teal), var(--ppg-teal-dim));
            color: var(--text-inverse);
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .login-brand p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .login-field {
            margin-bottom: 20px;
        }

        .login-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sec);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-field input {
            width: 100%;
            padding: 13px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .login-field input:focus {
            outline: none;
            border-color: var(--ppg-teal);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
        }

        .login-field input::placeholder {
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--ppg-teal), var(--ppg-teal-dim));
            color: var(--text-inverse);
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 2px 12px rgba(0, 212, 170, 0.2);
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 212, 170, 0.35);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-error {
            background: rgba(248, 113, 113, 0.08);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 3px solid var(--danger);
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-brand-name">
                    <h1>SmartLocker</h1>
                    <span class="badge">Cloud</span>
                </div>
                <p>PPG Marine Coatings Management</p>
            </div>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="post" action="/admin/login">
                <div class="login-field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="admin@ppg.com" required autofocus>
                </div>
                <div class="login-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="login-footer">
                PPG SmartLocker Platform v3.1 &middot; Marine Coatings Division
            </div>
        </div>
    </div>
</body>
</html>
