<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartLocker Cloud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #f0f2f5;
            --bg-card: #ffffff;
            --bg-input: #f5f7fa;
            --border: #e2e8f0;
            --ppg-blue: #2563eb;
            --ppg-blue-dark: #1d4ed8;
            --ppg-navy: #0f1d36;
            --text: #1e293b;
            --text-sec: #64748b;
            --text-muted: #94a3b8;
            --danger: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--ppg-navy) 0%, #1a3a5c 50%, var(--ppg-navy) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-brand-name {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .login-brand h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .login-brand .badge {
            background: var(--ppg-blue);
            color: #ffffff;
            padding: 3px 12px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        .login-brand p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .login-field {
            margin-bottom: 20px;
        }

        .login-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sec);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-field input {
            width: 100%;
            padding: 13px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .login-field input:focus {
            outline: none;
            border-color: var(--ppg-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .login-field input::placeholder {
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--ppg-blue);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25);
        }

        .login-btn:hover {
            background: var(--ppg-blue-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.35);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-error {
            background: #fee2e2;
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 3px solid var(--danger);
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-brand-name">
                    <h1>SmartLocker</h1>
                    <span class="badge">Cloud</span>
                </div>
                <p>PPG Marine Coatings Management</p>
            </div>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="post" action="/admin/login">
                <div class="login-field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="admin@ppg.com" required autofocus>
                </div>
                <div class="login-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="login-footer">
                PPG SmartLocker Platform v3.1 &middot; Marine Coatings Division
            </div>
        </div>
    </div>
</body>
</html>
